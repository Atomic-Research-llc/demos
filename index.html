<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F-16 PDA Tool — Data Pipeline Explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #060d06;
    --bg-panel: #0a140a;
    --bg-surface: #0f1a0f;
    --bg-hover: #142014;
    --border: #1a3a1a;
    --border-bright: #2a5a2a;
    --green-bright: #00ff41;
    --green-mid: #33cc33;
    --green-dim: #1a6b1a;
    --green-faint: #0d3a0d;
    --cyan: #00ccff;
    --amber: #ffcc00;
    --red: #ff4444;
    --text: #b0d4b0;
    --text-dim: #5a8a5a;
    --font-mono: 'Courier New', 'Consolas', monospace;
    --font-ui: system-ui, -apple-system, sans-serif;
  }

  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    z-index: 9999;
  }

  /* ─── LIGHT MODE ─── */
  body.light-mode {
    --bg-deep: #f0f2f0;
    --bg-panel: #ffffff;
    --bg-surface: #f7f9f7;
    --bg-hover: #e8ede8;
    --border: #c8d8c8;
    --border-bright: #90b090;
    --green-bright: #1a7a2e;
    --green-mid: #2d8a3f;
    --green-dim: #6aaa6a;
    --green-faint: #e0f0e0;
    --cyan: #0077aa;
    --amber: #996600;
    --red: #cc2222;
    --text: #2a3a2a;
    --text-dim: #6a8a6a;
  }
  body.light-mode::after { display: none; }
  body.light-mode .pipeline-node.active { text-shadow: none; }
  body.light-mode #header h1 { text-shadow: none; }
  body.light-mode .pipeline-arrow.active { text-shadow: none; }
  body.light-mode .anomaly-marker { text-shadow: none; }

  /* Theme toggle button */
  #theme-toggle {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-dim);
    background: var(--bg-surface);
    border: 1px solid var(--border);
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #theme-toggle:hover {
    border-color: var(--green-mid);
    color: var(--text);
  }

  /* ─── HEADER ─── */
  #header {
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-bright);
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #header h1 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--green-bright);
    text-shadow: 0 0 10px rgba(0,255,65,0.3);
    font-family: var(--font-mono);
  }
  #header .notional {
    font-size: 10px;
    color: var(--amber);
    letter-spacing: 2px;
    border: 1px solid var(--amber);
    padding: 2px 8px;
    opacity: 0.8;
  }

  /* ─── PIPELINE FLOW ─── */
  #pipeline-flow {
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
  }
  .pipeline-stage {
    display: flex;
    align-items: center;
    gap: 0;
    cursor: pointer;
  }
  .pipeline-node {
    padding: 8px 18px;
    border: 1px solid var(--border);
    background: var(--bg-surface);
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-dim);
    transition: all 0.2s;
    position: relative;
    white-space: nowrap;
  }
  .pipeline-node:hover {
    border-color: var(--green-dim);
    color: var(--text);
  }
  .pipeline-node.active {
    border-color: var(--green-bright);
    color: var(--green-bright);
    background: var(--green-faint);
    text-shadow: 0 0 8px rgba(0,255,65,0.4);
    box-shadow: 0 0 12px rgba(0,255,65,0.1);
  }
  .pipeline-node .stage-num {
    font-size: 9px;
    color: var(--text-dim);
    display: block;
    margin-bottom: 2px;
  }
  .pipeline-node.active .stage-num { color: var(--green-mid); }
  .pipeline-arrow {
    color: var(--green-dim);
    font-size: 18px;
    padding: 0 6px;
    user-select: none;
  }
  .pipeline-arrow.active { color: var(--green-bright); text-shadow: 0 0 6px rgba(0,255,65,0.4); }

  /* ─── MAIN LAYOUT ─── */
  #main {
    display: flex;
    height: calc(100vh - 200px);
    min-height: 500px;
  }

  /* ─── SIDEBAR ─── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
  }
  .ctrl-section {
    margin-bottom: 16px;
  }
  .ctrl-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--green-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .ctrl-btn {
    display: block;
    width: 100%;
    padding: 8px 10px;
    margin-bottom: 4px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .ctrl-btn:hover {
    border-color: var(--green-dim);
    background: var(--bg-hover);
  }
  .ctrl-btn.active {
    border-color: var(--green-bright);
    color: var(--green-bright);
    background: var(--green-faint);
  }
  .ctrl-btn .btn-sub {
    font-size: 9px;
    color: var(--text-dim);
    display: block;
    margin-top: 1px;
  }
  .ctrl-btn.active .btn-sub { color: var(--green-dim); }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .slider-row input[type="range"] {
    flex: 1;
    accent-color: var(--green-bright);
    height: 4px;
  }
  .slider-val {
    font-size: 12px;
    color: var(--green-bright);
    min-width: 40px;
    text-align: right;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
  }
  .toggle {
    width: 36px;
    height: 18px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 12px;
    height: 12px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: all 0.2s;
  }
  .toggle.on {
    border-color: var(--green-bright);
    background: var(--green-faint);
  }
  .toggle.on::after {
    left: 20px;
    background: var(--green-bright);
  }
  .toggle-label {
    font-size: 11px;
    color: var(--text);
  }

  /* ─── CONTENT ─── */
  #content {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }

  .content-title {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--green-bright);
    margin-bottom: 4px;
    text-shadow: 0 0 8px rgba(0,255,65,0.2);
  }
  .content-desc {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 16px;
    line-height: 1.6;
    max-width: 800px;
  }

  /* Data table */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    margin-bottom: 16px;
  }
  .data-table th {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    padding: 6px 8px;
    text-align: left;
    color: var(--green-dim);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .data-table td {
    border: 1px solid var(--border);
    padding: 5px 8px;
    color: var(--text);
    font-family: var(--font-mono);
  }
  .data-table tr:hover td {
    background: var(--bg-hover);
  }
  .data-table tr.highlight td {
    background: rgba(0,255,65,0.05);
    border-color: var(--green-dim);
  }
  .hex { color: var(--cyan); }
  .decoded { color: var(--green-bright); }
  .pass { color: var(--green-bright); }
  .fail { color: var(--red); }
  .warn { color: var(--amber); }
  .dim { color: var(--text-dim); }

  /* Bit field visualization */
  .bitfield-viz {
    margin: 16px 0;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    padding: 16px;
    border-radius: 2px;
  }
  .bitfield-title {
    font-size: 11px;
    color: var(--cyan);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .bitfield-row {
    display: flex;
    margin-bottom: 2px;
  }
  .bit-cell {
    width: 32px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .bit-cell.field-a { background: rgba(0,204,255,0.12); color: var(--cyan); border-color: rgba(0,204,255,0.3); }
  .bit-cell.field-b { background: rgba(0,255,65,0.08); color: var(--green-bright); border-color: rgba(0,255,65,0.25); }
  .bit-cell.field-c { background: rgba(255,204,0,0.08); color: var(--amber); border-color: rgba(255,204,0,0.25); }
  .bit-cell.field-d { background: rgba(255,68,68,0.08); color: var(--red); border-color: rgba(255,68,68,0.2); }
  .bit-num {
    display: flex;
    margin-bottom: 4px;
  }
  .bit-num span {
    width: 32px;
    text-align: center;
    font-size: 8px;
    color: var(--text-dim);
  }

  .field-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 12px;
  }
  .field-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
  }
  .field-swatch {
    width: 12px;
    height: 12px;
    border: 1px solid;
  }

  /* Decoding detail */
  .decode-chain {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 12px 0;
    flex-wrap: wrap;
  }
  .decode-step {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    padding: 8px 12px;
    font-size: 11px;
    min-width: 100px;
    text-align: center;
  }
  .decode-step .step-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 3px;
  }
  .decode-step .step-value {
    color: var(--green-bright);
    font-size: 13px;
  }
  .decode-arrow {
    color: var(--green-dim);
    font-size: 16px;
  }

  /* Requirements table */
  .req-status {
    display: inline-block;
    padding: 2px 8px;
    font-size: 10px;
    letter-spacing: 1px;
    font-weight: 700;
    border: 1px solid;
  }
  .req-status.pass {
    border-color: var(--green-bright);
    background: rgba(0,255,65,0.08);
  }
  .req-status.fail {
    border-color: var(--red);
    background: rgba(255,68,68,0.08);
  }
  .req-status.warn {
    border-color: var(--amber);
    background: rgba(255,204,0,0.08);
  }

  /* Anomaly chart */
  .anomaly-chart {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    padding: 16px;
    margin: 12px 0;
    font-size: 10px;
    line-height: 1.2;
    overflow-x: auto;
  }
  .chart-row {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 14px;
  }
  .chart-label {
    width: 60px;
    text-align: right;
    color: var(--text-dim);
    font-size: 9px;
    flex-shrink: 0;
  }
  .chart-bar-area {
    flex: 1;
    display: flex;
    gap: 1px;
    height: 10px;
  }
  .chart-dot {
    width: 6px;
    height: 10px;
    border-radius: 1px;
    transition: all 0.2s;
  }
  .chart-dot.normal { background: var(--green-dim); }
  .chart-dot.anomaly { background: var(--red); box-shadow: 0 0 4px rgba(255,68,68,0.5); }
  .chart-dot.borderline { background: var(--amber); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
    margin: 12px 0;
  }
  .stat-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    padding: 12px;
  }
  .stat-card .stat-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .stat-card .stat-value {
    font-size: 22px;
    color: var(--green-bright);
    margin-top: 4px;
    text-shadow: 0 0 8px rgba(0,255,65,0.2);
  }
  .stat-card .stat-value.fail-val { color: var(--red); text-shadow: 0 0 8px rgba(255,68,68,0.2); }
  .stat-card .stat-value.warn-val { color: var(--amber); }

  /* Info boxes */
  .info-box {
    background: var(--bg-surface);
    border-left: 3px solid var(--cyan);
    padding: 10px 14px;
    margin: 12px 0;
    font-size: 11px;
    line-height: 1.6;
    color: var(--text);
  }
  .info-box .info-title {
    color: var(--cyan);
    font-size: 10px;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .info-box code {
    background: rgba(0,204,255,0.1);
    padding: 1px 4px;
    color: var(--cyan);
    font-size: 11px;
  }

  /* ─── PROMPT OUTPUT ─── */
  #prompt-bar {
    background: var(--bg-panel);
    border-top: 1px solid var(--border-bright);
    padding: 10px 20px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    max-height: 160px;
  }
  #prompt-text {
    flex: 1;
    font-size: 11px;
    color: var(--text);
    font-family: var(--font-mono);
    line-height: 1.5;
    overflow-y: auto;
    max-height: 140px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #copy-btn {
    background: var(--green-faint);
    border: 1px solid var(--green-bright);
    color: var(--green-bright);
    padding: 8px 16px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #copy-btn:hover {
    background: rgba(0,255,65,0.15);
    box-shadow: 0 0 8px rgba(0,255,65,0.2);
  }
  #copy-btn.copied {
    background: var(--green-bright);
    color: var(--bg-deep);
  }

  /* ─── PRESETS ─── */
  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }
  .preset-btn {
    padding: 6px 8px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .preset-btn:hover {
    border-color: var(--cyan);
    color: var(--cyan);
  }

  /* Flow diagram section */
  .flow-explanation {
    display: grid;
    grid-template-columns: 1fr auto 1fr auto 1fr auto 1fr;
    gap: 0;
    align-items: stretch;
    margin: 16px 0;
  }
  .flow-box {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    padding: 12px;
    min-height: 100px;
  }
  .flow-box.active {
    border-color: var(--green-bright);
    box-shadow: 0 0 12px rgba(0,255,65,0.08);
  }
  .flow-box .flow-title {
    font-size: 10px;
    color: var(--green-bright);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .flow-box .flow-detail {
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .flow-connector {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--green-dim);
    font-size: 20px;
    padding: 0 4px;
  }

  /* Message selector */
  .msg-selector {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .msg-chip {
    padding: 4px 10px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .msg-chip:hover { border-color: var(--green-dim); color: var(--text); }
  .msg-chip.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,204,255,0.05); }

  /* ─── B5 CROSS-CHANNEL ─── */
  .xchan-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 12px 0;
  }
  .chan-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    padding: 10px;
    position: relative;
    transition: all 0.3s;
  }
  .chan-card.healthy { border-color: var(--green-dim); }
  .chan-card.isolated { border-color: var(--red); background: rgba(255,68,68,0.04); }
  .chan-card.selected { box-shadow: 0 0 12px rgba(0,255,65,0.15); border-color: var(--green-bright); }
  .chan-card.dimmed { opacity: 0.35; filter: grayscale(0.5); transform: scale(0.97); }
  .chan-card .chan-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--green-bright);
    margin-bottom: 6px;
  }
  .chan-card.isolated .chan-label { color: var(--red); }
  .chan-card .chan-val {
    font-size: 18px;
    color: var(--green-bright);
    text-shadow: 0 0 8px rgba(0,255,65,0.2);
  }
  .chan-card.isolated .chan-val { color: var(--red); text-shadow: 0 0 8px rgba(255,68,68,0.2); }
  .chan-tag {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 8px;
    letter-spacing: 1px;
    padding: 1px 5px;
    border: 1px solid;
  }
  .chan-tag.voter-sel { color: var(--green-bright); border-color: var(--green-bright); }
  .chan-tag.iso { color: var(--red); border-color: var(--red); }

  .tolerance-bar {
    height: 6px;
    background: var(--bg-deep);
    border: 1px solid var(--border);
    margin-top: 8px;
    position: relative;
    overflow: visible;
  }
  .tolerance-fill {
    height: 100%;
    transition: width 0.3s;
  }
  .tolerance-fill.ok { background: var(--green-dim); }
  .tolerance-fill.warn { background: var(--amber); }
  .tolerance-fill.fail { background: var(--red); }
  .tolerance-markers {
    position: absolute;
    top: -3px;
    width: 2px;
    height: 12px;
    background: var(--amber);
    opacity: 0.6;
  }

  /* FDIR Timeline */
  .fdir-timeline {
    position: relative;
    margin: 16px 0;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    padding: 16px;
  }
  .fdir-phase-row {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }
  .fdir-phase-label {
    width: 90px;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-dim);
    text-align: right;
    padding-right: 12px;
    flex-shrink: 0;
  }
  .fdir-phase-track {
    flex: 1;
    height: 24px;
    background: var(--bg-deep);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .fdir-phase-bar {
    position: absolute;
    top: 2px;
    height: 20px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--bg-deep);
    font-weight: 700;
    transition: all 0.3s;
  }
  .fdir-phase-bar.detect { background: var(--amber); }
  .fdir-phase-bar.isolate { background: var(--red); }
  .fdir-phase-bar.recover { background: var(--cyan); }
  .fdir-phase-bar.pass { opacity: 1; }
  .fdir-phase-bar.fail { opacity: 1; background: repeating-linear-gradient(45deg, var(--red), var(--red) 4px, rgba(255,68,68,0.5) 4px, rgba(255,68,68,0.5) 8px); }
  .fdir-deadline {
    position: absolute;
    top: 0;
    width: 2px;
    height: 100%;
    background: var(--red);
    opacity: 0.5;
  }
  .fdir-phase-timing {
    width: 80px;
    font-size: 9px;
    color: var(--text-dim);

function generateAnomalyData(count, contamination, seed) {
  const data = [];
  let s = seed;
  function rand() { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; }
  for (let i = 0; i < count; i++) {
    const isAnomaly = rand() < contamination;
    const isBorderline = !isAnomaly && rand() < 0.05;
    data.push({
      time: (i * 2.0).toFixed(1),
      value: isAnomaly ? 0.7 + rand() * 0.3 : (isBorderline ? 0.45 + rand() * 0.15 : rand() * 0.4),
      label: isAnomaly ? 'anomaly' : (isBorderline ? 'borderline' : 'normal')
    });
  }
  return data;
}

// NOTIONAL — not derived from classified sources
function generateCrossChannelData(count, seed) {
  const data = [];
  let s = seed;
  function rand() { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; }
  for (let i = 0; i < count; i++) {
    const t = (i * 0.025).toFixed(3); // 40 Hz frame rate
    const base = 5.0 + Math.sin(i * 0.08) * 3.0; // baseline pitch command
    const noise = () => (rand() - 0.5) * 0.02;
    // Ch-D diverges around frame 60-65 (the FDIR trigger zone)
    const dDrift = (i >= 58 && i < 66) ? (i - 58) * 0.025 : 0;
    data.push({
      time: parseFloat(t),
      chA: parseFloat((base + noise()).toFixed(4)),
      chB: parseFloat((base + noise()).toFixed(4)),
      chC: parseFloat((base + noise()).toFixed(4)),
      chD: parseFloat((base + noise() + dDrift).toFixed(4)),
      agree: dDrift < 0.05
    });
  }
  return data;
}

  el.innerHTML = STAGES.map((s, i) => {

      ? `<span class="pipeline-arrow ${state.stage === STAGES[i+1].id || state.stage === s.id ? 'active' : ''}">\u25B6</span>`

    return `

  }).join('');

      <button class="preset-btn" onclick="applyPreset('b5fcc')">B5 / FCC</button>
      <button class="preset-btn" onclick="applyPreset('anomaly')">ANOMALY</button>
      <button class="preset-btn" onclick="applyPreset('cvpipeline')">CV / MFD</button>
      <button class="preset-btn" onclick="applyPreset('viz')">VIDEO/VIZ</button>
      <button class="preset-btn" onclick="applyPreset('replay')">REPLAY</button>

  document.getElementById('sidebar').innerHTML = html;
}

// ─── PRESETS ───
function applyPreset(name) {
  switch(name) {
    case 'overview':
      state.stage = 'ingest'; state.subsystem = 'radar'; state.messageIdx = 0;
      state.showDecoded = false; state.showExplanations = true;
      break;
    case 'decode':
      state.stage = 'icd'; state.subsystem = 'radar'; state.messageIdx = 0;
      state.lsbOverride = null; state.showExplanations = true;
      break;
    case 'reqcheck':
      state.stage = 'as3'; state.subsystem = 'radar'; state.showExplanations = true;
      break;
    case 'b5fcc':
      state.stage = 'b5'; state.subsystem = 'flcs'; state.b5View = 'xchan';
      state.b5Channel = null; state.xchanTolerance = 0.05;
      state.showExplanations = true;
      break;
    case 'derived':
      state.stage = 'derived'; state.showExplanations = true;
      break;
    case 'anomaly':
      state.stage = 'aiml'; state.subsystem = 'radar'; state.anomalySensitivity = 0.10;
      state.showExplanations = true;
      break;
    case 'cvpipeline':
      state.stage = 'cv'; state.cvView = 'overview'; state.cvBackend = 'template';
      state.cvConfidence = 0.50; state.showExplanations = true;
      break;
    case 'viz':
      state.stage = 'viz'; state.vizView = 'video'; state.showExplanations = true;
      break;
    case 'replay':
      state.stage = 'viz'; state.vizView = 'replay'; state.showExplanations = true;
      break;
  }
  updateAll();
}

// ─── RENDER CONTENT ───
function renderContent() {
  // NOTE: All content is static/notional educational data rendered by the app
  // itself — no external or user-supplied input is injected into the HTML.
  const el = document.getElementById('content');
  switch (state.stage) {
    case 'ingest':  el.innerHTML = renderIngest(); break;
    case 'icd':     el.innerHTML = renderICD(); break;
    case 'derived': el.innerHTML = renderDerived(); break;
    case 'as3':     el.innerHTML = renderAS3(); break;
    case 'b5':      el.innerHTML = renderB5(); break;
    case 'aiml':    el.innerHTML = renderAIML(); break;
    case 'cv':      el.innerHTML = renderCV(); break;
    case 'viz':     el.innerHTML = renderViz(); break;
  }
}

// ─── STAGE 1: INGEST ───
function renderIngest() {
  const sub = SUBSYSTEMS[state.subsystem];
  const msg = sub.messages[state.messageIdx];
  let html = '';

  html += `<div class="content-title">STAGE 01: .C10 + PCAP FLIGHT DATA INGESTION</div>`;
  html += `<div class="content-desc">
    Chapter 10 (IRIG 106) files contain time-stamped recordings of all MIL-STD-1553B bus traffic
    and video channels captured during flight test. Each 1553 message is identified by its Remote Terminal (RT) address,
    Subaddress (SA), and transfer direction. Video packets (Type 0xF0) are extracted in parallel for
    synchronized playback. Companion <strong>PCAP files</strong> provide Ethernet traffic (e.g., Link 16 MIDS,
    weapon datalinks) that is mapped to virtual RT/SA addresses via ICD-defined <code>virtual_rt_mapping</code>
    entries and time-aligned with 1553 bus data.
  </div>`;

  if (state.showExplanations) {
    html += `<div class="info-box">
      <div class="info-title">HOW .C10 INGESTION WORKS</div>
      The PDA Tool reads raw .c10 recorder files and extracts every 1553 bus transaction.
      Each message has a <code>timestamp</code>, <code>bus (A/B)</code>, <code>RT address</code> (0-30),
      <code>subaddress</code> (1-30), <code>T/R bit</code> (transmit/receive), and up to 32 <code>data words</code> (16 bits each).
      The tool normalizes these into an internal time-indexed representation for downstream analysis.
      <br><br>
      <strong>PCAP / Ethernet ingestion:</strong> Companion .pcap files are read by the <code>PcapReader</code>
      and decoded via <code>EthernetDecoder</code>. The ICD's <code>virtual_rt_mapping</code> maps
      (dst_ip, dst_port) tuples to virtual RT/SA addresses so Ethernet messages (e.g., Link 16 MIDS tracks,
      JASSM weapon datalinks, TGP streaming telemetry) enter the same <code>MessageStore</code> as 1553 data.
      The <code>pcap_time_aligned</code> flag controls whether PCAP timestamps are treated as concurrent
      (same time base as C10) or appended sequentially.
      <br><br>
      <strong>Video extraction:</strong> Chapter 10 video packets (Type 0xF0) are demuxed by channel ID,
      re-encoded to H.264 for browser playback, and time-aligned with 1553 bus data. Gap detection identifies
      missing frames. The <code>VideoExtractor</code> produces per-channel MP4 files with timeline metadata
      for synchronized HUD telemetry overlay.
    </div>`;
  }

  // Flow diagram
  html += `<div class="flow-explanation">
    <div class="flow-box active">
      <div class="flow-title">.C10 + .PCAP FILES</div>
      <div class="flow-detail">
        IRIG 106 Ch.10<br>
        1553 bus capture<br>
        Video packets (F0)<br>
        PCAP Ethernet traffic<br>
        Time-stamped
      </div>
    </div>
    <div class="flow-connector">▶</div>
    <div class="flow-box">
      <div class="flow-title">DEMUX</div>
      <div class="flow-detail">
        1553: RT/SA split<br>
        Video: channel split<br>
        PCAP: virtual RT/SA map<br>
        Validate checksums<br>
        Gap detection
      </div>
    </div>
    <div class="flow-connector">▶</div>
    <div class="flow-box">
      <div class="flow-title">NORMALIZE</div>
      <div class="flow-detail">
        Time-align 1553 + PCAP<br>
        Index by RT/SA<br>
        Video → H.264 MP4<br>
        HUD metadata sync
      </div>
    </div>
    <div class="flow-connector">▶</div>
    <div class="flow-box">
      <div class="flow-title">OUTPUT</div>
      <div class="flow-detail">
        Unified MessageStore<br>
        Video files + timeline<br>
        Annotation anchors<br>
        Ready for analysis
      </div>
    </div>
  </div>`;

  // Simulated bus traffic table
  html += `<div style="margin-top:16px">
    <div class="ctrl-label" style="margin-bottom:8px">CAPTURED 1553 BUS TRAFFIC — ${sub.short} (RT ${sub.rt})</div>
  </div>`;

  const timestamps = ['00:12:33.4210','00:12:33.4410','00:12:33.5210','00:12:33.5610','00:12:33.6210','00:12:33.7010','00:12:33.7810','00:12:33.8210'];

  html += `<table class="data-table"><tr>
    <th>TIME</th><th>BUS</th><th>RT</th><th>T/R</th><th>SA</th><th>WC</th>
    ${state.showDecoded ? '<th>DECODED FIELDS</th>' : '<th>DATA WORDS (HEX)</th>'}
  </tr>`;

  timestamps.forEach((ts, i) => {
    const m = sub.messages[i % sub.messages.length];
    const isSelected = (i % sub.messages.length) === state.messageIdx;
    const bus = i % 3 === 0 ? 'B' : 'A';

    let dataCol;

}

// ─── STAGE 2: ICD PARSE ───
function renderICD() {
  const sub = SUBSYSTEMS[state.subsystem];
  const msg = sub.messages[state.messageIdx];
  let html = '';

  html += `<div class="content-title">STAGE 02: ICD PARSING ENGINE</div>`;
  html += `<div class="content-desc">
    The ICD (Interface Control Document) defines the exact bit-level format of each 1553 message.
    The parsing engine uses these definitions to decode raw hex data words into engineering-unit parameters.
  </div>`;

  if (state.showExplanations) {
    html += `<div class="info-box">
      <div class="info-title">ICD DECODING PROCESS</div>
      Each 1553 data word is 16 bits. The ICD specifies which bits belong to which parameter,
      the data type (unsigned, signed, enum, discrete), the <code>LSB scaling factor</code>,
      and the engineering <code>unit</code>. Decoding follows:<br>
      <strong>Raw Hex → Binary → Bit Extraction → Integer Value → × LSB → Engineering Units</strong>
      <br><br>
      The loader auto-detects format from file extension: <code>.json</code> files use the JSON ICD schema,
      while <code>.xml</code> and <code>.txt</code> files are parsed by the <code>XmlIcdLoader</code>,
      which handles MIL-STD-1553 addresses, Ethernet messages, multiplexed (MUX) messages,
      User-Defined Types (UDT), and enumeration ranges.
    </div>`;
  }

  // Message header
  html += `<div style="margin:12px 0">
    <span class="ctrl-label">MESSAGE: </span>
    <span style="color:var(--cyan)">RT ${sub.rt}, SA ${msg.sa}, ${msg.dir}, ${msg.wc} Words</span>
    <span style="color:var(--text-dim)"> — ${msg.label}</span>
  </div>`;

  // Bit field visualization for first word
  const rawWord = parseInt(msg.rawWords[0], 16);
  const binary = rawWord.toString(2).padStart(16, '0');

  html += `<div class="bitfield-viz">
    <div class="bitfield-title">WORD 0: 0x${msg.rawWords[0]} — BIT FIELD BREAKDOWN</div>`;

  // Bit number row
  html += `<div class="bit-num">`;
  for (let i = 15; i >= 0; i--) html += `<span>${i}</span>`;
  html += `</div>`;

  // Bit value row with field coloring
  html += `<div class="bitfield-row">`;
  const word0Fields = msg.fields.filter(f => f.word === 0);
  for (let i = 15; i >= 0; i--) {
    let cls = '';
    for (const f of word0Fields) {
      if (i >= f.bitsLo && i <= f.bitsHi) { cls = f.cls; break; }
    }
    html += `<div class="bit-cell ${cls}">${binary[15 - i]}</div>`;
  }
  html += `</div>`;

  // Legend
  html += `<div class="field-legend">`;
  word0Fields.forEach(f => {
    const colors = {
      'field-a': { bg: 'rgba(0,204,255,0.12)', border: 'rgba(0,204,255,0.3)', text: '#00ccff' },
      'field-b': { bg: 'rgba(0,255,65,0.08)', border: 'rgba(0,255,65,0.25)', text: '#00ff41' },
      'field-c': { bg: 'rgba(255,204,0,0.08)', border: 'rgba(255,204,0,0.25)', text: '#ffcc00' },
      'field-d': { bg: 'rgba(255,68,68,0.08)', border: 'rgba(255,68,68,0.2)', text: '#ff4444' },
    };
    const c = colors[f.cls];
    html += `<div class="field-legend-item">
      <div class="field-swatch" style="background:${c.bg};border-color:${c.border}"></div>
      <span style="color:${c.text}">[${f.bitsHi}:${f.bitsLo}] ${f.name}</span>
    </div>`;
  });
  html += `</div></div>`;

  // Decode chain for each field
  html += `<div class="ctrl-label" style="margin:16px 0 8px">FIELD DECODING</div>`;

  msg.fields.forEach(f => {
    const raw = parseInt(msg.rawWords[f.word], 16);
    const lsb = (f.word === 0 && state.lsbOverride !== null && f.lsb) ? state.lsbOverride : f.lsb;
    const decoded = decodeFieldCustomLsb(raw, f, lsb);
    const extracted = extractBits(raw, f.bitsHi, f.bitsLo);
    const isOverridden = f.word === 0 && state.lsbOverride !== null && f.lsb && state.lsbOverride !== f.lsb;

    html += `<div class="decode-chain">
      <div class="decode-step">
        <div class="step-label">RAW HEX</div>
        <div class="step-value" style="color:var(--cyan)">0x${msg.rawWords[f.word]}</div>
      </div>
      <span class="decode-arrow">▶</span>
      <div class="decode-step">
        <div class="step-label">BITS [${f.bitsHi}:${f.bitsLo}]</div>
        <div class="step-value">${extracted}</div>
      </div>
      <span class="decode-arrow">▶</span>
      <div class="decode-step">
        <div class="step-label">${f.type === 'Enum' || f.type === 'Discrete' ? 'LOOKUP' : '× LSB ' + (lsb || '')}</div>
        <div class="step-value" style="color:var(--green-bright);${isOverridden ? 'text-shadow:0 0 8px rgba(255,204,0,0.5);color:var(--amber)' : ''}">${decoded}</div>
      </div>
      <div class="decode-step" style="border-color:var(--green-dim)">
        <div class="step-label">PARAMETER</div>
        <div class="step-value" style="font-size:10px;color:var(--text)">${f.name}${f.unit ? ' (' + f.unit + ')' : ''}</div>
      </div>
    </div>`;
  });

  // Full decoded table
  html += `<div class="ctrl-label" style="margin:20px 0 8px">ALL WORDS — DECODED</div>`;
  html += `<table class="data-table"><tr>
    <th>WORD</th><th>RAW HEX</th><th>BINARY</th><th>FIELD</th><th>DECODED VALUE</th>
  </tr>`;

  msg.rawWords.forEach((w, wi) => {
    const rawVal = parseInt(w, 16);
    const bin = rawVal.toString(2).padStart(16, '0');
    const fields = msg.fields.filter(f => f.word === wi);
    if (fields.length === 0) {
      html += `<tr><td>${wi}</td><td class="hex">${w}</td><td class="dim">${bin}</td><td class="dim">—</td><td class="dim">—</td></tr>`;
    } else {
      fields.forEach((f, fi) => {
        const decoded = decodeField(rawVal, f);
        html += `<tr${fi === 0 ? '' : ' style="border-top:none"'}>
          ${fi === 0 ? `<td rowspan="${fields.length}">${wi}</td><td rowspan="${fields.length}" class="hex">${w}</td><td rowspan="${fields.length}" class="dim">${bin}</td>` : ''}
          <td>${f.name} <span class="dim">[${f.bitsHi}:${f.bitsLo}]</span></td>
          <td class="decoded">${decoded}${f.unit ? ' ' + f.unit : ''}</td>
        </tr>`;
      });
    }
  });
  html += `</table>`;

  return html;
}

// ─── STAGE 3: AS3 EVAL ───
function renderAS3() {
  const sub = SUBSYSTEMS[state.subsystem];
  let html = '';

  html += `<div class="content-title">STAGE 04: AS3 REQUIREMENT EVALUATION</div>`;
  html += `<div class="content-desc">
    AS3 system-level requirements define what each subsystem must do. The analysis engine
    evaluates decoded flight data — including <strong>derived fields</strong> computed in Stage 03 —
    against each requirement, producing pass/fail determinations with evidence.
    The evaluator supports <strong>10 rule types</strong> across 1553 bus analysis and CV video verification.
  </div>`;

  if (state.showExplanations) {
    html += `<div class="info-box">
      <div class="info-title">HOW AS3 EVALUATION WORKS</div>
      Each AS3 requirement becomes a testable assertion. The engine scans the decoded time-series data
      for the relevant parameters and evaluates conditions. <strong>10 rule types</strong> are supported:
      <br><br>
      <strong>Bus data rules:</strong>
      <code>timing</code> (response latency),
      <code>state_transition</code> (valid FSM sequences),
      <code>range_check</code> (value bounds),
      <code>conditional</code> (if-then field checks),
      <code>rate_check</code> (message frequency),
      <code>field_comparison</code> (cross-bus value matching with tolerance),
      <code>event_window</code> (state machine: arm event → time window → max fires).
      <br><br>
      <strong>CV video rules:</strong>
      <code>video_symbol_detection</code> (symbol presence on MFD),
      <code>video_position_check</code> (symbol position vs ICD data),
      <code>video_text_match</code> (OCR text verification on MFD).
      <br><br>
      Results include the actual measured value, the pass/fail threshold, and supporting evidence
      with timestamps for traceability.
    </div>`;
  }

  // TC initial state banner
  if (sub.isTC && sub.initialState) {
    html += `<div class="info-box" style="border-left-color:var(--cyan)">
      <div class="info-title">INITIAL AIRCRAFT STATE — SORTIE ${sub.sortie}</div>
      ${sub.initialState}
    </div>`;
  }

  // Summary stats
  const passCount = sub.requirements.filter(r => r.status === 'pass').length;
  const failCount = sub.requirements.filter(r => r.status === 'fail').length;
  const warnCount = sub.requirements.filter(r => r.status === 'warn').length;
  const total = sub.requirements.length;

  html += `<div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">TOTAL REQUIREMENTS</div>
      <div class="stat-value">${total}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">PASS</div>
      <div class="stat-value">${passCount}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">FAIL</div>
      <div class="stat-value ${failCount > 0 ? 'fail-val' : ''}">${failCount}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">WARNING</div>
      <div class="stat-value ${warnCount > 0 ? 'warn-val' : ''}">${warnCount}</div>
    </div>
  </div>`;

  // Requirements table
  const hasRuleTypes = sub.requirements.some(r => r.ruleType);
  html += `<table class="data-table"><tr>
    <th>STATUS</th><th>REQ ID</th>${hasRuleTypes ? '<th>RULE TYPE</th>' : ''}<th>REQUIREMENT</th><th>ACTUAL</th><th>THRESHOLD</th>
  </tr>`;

  sub.requirements.forEach(r => {
    html += `<tr>
      <td><span class="req-status ${r.status}">${r.status.toUpperCase()}</span></td>
      <td style="color:var(--cyan);white-space:nowrap">${r.id}</td>
      ${hasRuleTypes ? `<td><span style="font-size:9px;color:var(--cyan)">${(r.ruleType || '').replace(/_/g, ' ')}</span></td>` : ''}
      <td>${r.text}</td>
      <td class="${r.status === 'pass' ? 'pass' : r.status === 'fail' ? 'fail' : 'warn'}">${r.actual}</td>
      <td class="dim">${r.threshold}</td>
    </tr>`;
  });
  html += `</table>`;

  // Evidence detail
  html += `<div class="ctrl-label" style="margin:16px 0 8px">EVIDENCE LOG</div>`;
  sub.requirements.forEach(r => {
    const borderColor = r.status === 'pass' ? 'var(--green-dim)' : r.status === 'fail' ? 'var(--red)' : 'var(--amber)';
    html += `<div style="background:var(--bg-surface);border-left:3px solid ${borderColor};padding:8px 12px;margin-bottom:4px;font-size:11px">
      <span style="color:var(--cyan)">${r.id}</span>
      <span class="${r.status}">[${r.status.toUpperCase()}]</span>
      — ${r.evidence}
    </div>`;
  });

  return html;
}

// ─── STAGE 4: B5 FCC EVALUATION ───
function renderB5() {
  const sub = SUBSYSTEMS.flcs;
  let html = '';

  html += `<div class="content-title">STAGE 05: B5 SUB-SYSTEM REQUIREMENT EVALUATION</div>`;
  html += `<div class="content-desc">
    B5 requirements govern the Flight Control Computer (FCC) at sub-system level, covering quad-redundant
    channel correlation, voter logic, gain schedules, authority limits, and FDIR (Failure Detection,
    Isolation, and Recovery) sequences. These run in parallel with AS3 system-level evaluation.
  </div>`;

  if (state.showExplanations) {
    html += `<div class="info-box">
      <div class="info-title">HOW B5 EVALUATION WORKS</div>
      The F-16 FLCS uses four independent FCC channels (A, B, C, D) for safety-critical redundancy.
      The PDA Tool's <code>CrossChannelEvaluator</code> runs alongside the AS3 <code>RequirementEvaluator</code>.
      It time-aligns data from all four channels using a <code>ChannelFrameBuffer</code> (2ms tolerance window),
      then compares per-field values against B5 tolerances. A separate <code>FDIRSequenceTracker</code> state machine
      verifies that failure detection, isolation, and recovery phases meet timing and coverage requirements.
      <br><br>
      <strong>Expanded B5 pipeline (v2):</strong> The evaluator now supports <strong>41 requirements</strong> across
      <strong>10+ rule types</strong>: <code>cross_channel</code>, <code>fdir_timing</code>, <code>fdir_coverage</code>,
      <code>state_transition</code>, <code>authority_limit</code>, <code>rate_of_change</code>,
      <code>gain_schedule</code>, <code>tracking_error</code>, <code>timing</code>, and <code>conditional</code>.
      <br><br>
      The FLCS ICD now covers <strong>SA1-SA7</strong> plus Voter SA2: surface commands, FCC status,
      control law state, rate/accel feedback, pilot inputs, surface position feedback, and air data.
      A <code>B5ChannelFieldCache</code> provides cross-SA correlation with staleness tracking,
      and a <code>ChannelStateTracker</code> maintains temporal state for state machine validation.
      Derivative monitoring uses a <code>DerivativeComputer</code> for rate-of-change checks, and
      a <code>TransientAnalyzer</code> detects step responses and settling times.
      <br><br>
      <strong>Sliding window stats:</strong> A <code>SlidingWindowStats</code> engine computes rolling
      mean/std/trend for spread metrics across three window categories: short (2s) for rate feedback,
      medium (10s) for surface commands, and long (30s) for air data. A <code>B5SpreadAnomalyDetector</code>
      applies Isolation Forest to the spread feature vectors to detect subtle cross-channel divergence.
      <br><br>
      Key difference from AS3: B5 requirements use <code>bus_name</code> to distinguish FLCS bus traffic from the
      avionics mux bus, and the ICD lookup is bus-qualified: <code>(bus_name, rt, sa, direction)</code>.
    </div>`;
  }

  if (state.b5View === 'xchan') {
    html += renderB5CrossChannel(sub);
  } else if (state.b5View === 'fdir') {
    html += renderB5FDIR(sub);
  } else {
    html += renderB5Requirements(sub);
  }

  return html;
}

function renderB5CrossChannel(sub) {
  let html = '';
  const data = sub.crossChannelData;
  const tol = state.xchanTolerance;

  html += `<div class="section-header">CROSS-CHANNEL CORRELATION — PITCH COMMAND</div>`;

  // Channel cards (quad grid)
  const lastFrame = data[data.length - 1];
  const channels = ['A','B','C','D'];
  const vals = [lastFrame.chA, lastFrame.chB, lastFrame.chC, lastFrame.chD];
  const median = (() => { const s = [...vals].sort((a,b) => a - b); return (s[1] + s[2]) / 2; })();

  html += `<div class="xchan-grid">`;
  channels.forEach((ch, i) => {
    const val = vals[i];
    const dev = Math.abs(val - median);
    const healthy = dev < tol;
    const selected = state.b5Channel === ch || state.b5Channel === null;
    const dimmed = state.b5Channel !== null && state.b5Channel !== ch;
    const cls = [
      'chan-card',
      healthy ? 'healthy' : 'isolated',
      selected ? 'selected' : '',
      dimmed ? 'dimmed' : ''
    ].join(' ');

    html += `<div class="${cls}" onclick="setState('b5Channel', state.b5Channel === '${ch}' ? null : '${ch}')">
      <div class="chan-label">CH-${ch}</div>
      <div class="chan-val">${val.toFixed(4)} deg</div>
      <div style="font-size:9px;color:var(--text-dim);margin-top:4px">
        &Delta; ${dev.toFixed(4)} from median
      </div>
      <div style="margin-top:6px;height:4px;border-radius:2px;background:var(--bg-deep);overflow:hidden">
        <div style="width:${Math.min(100, (dev / tol) * 100)}%;height:100%;background:${healthy ? 'var(--green-dim)' : 'var(--red)'};border-radius:2px"></div>
      </div>
      <div style="font-size:8px;color:var(--text-dim);margin-top:2px">${(dev / tol * 100).toFixed(0)}% of tolerance</div>
    </div>`;
  });
  html += `</div>`;

  // Agreement sparkline
  const sparkWidth = 600;
  const barW = Math.max(2, Math.floor(sparkWidth / data.length));
  html += `<div style="margin-top:16px">
    <div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;letter-spacing:1px">AGREEMENT TIMELINE</div>
    <div class="agreement-spark" style="display:flex;gap:1px;height:20px;align-items:end">
      ${data.map((d, i) => {
        const devs = [d.chA, d.chB, d.chC, d.chD];
        const med = (() => { const s = [...devs].sort((a,b) => a-b); return (s[1] + s[2]) / 2; })();
        const maxDev = Math.max(...devs.map(v => Math.abs(v - med)));
        const ok = maxDev < tol;
        return `<div class="spark-bar ${ok ? 'agree' : 'disagree'}" style="width:${barW}px;height:${Math.max(3, Math.min(20, (maxDev / tol) * 20))}px" title="t=${d.time}s dev=${maxDev.toFixed(4)}"></div>`;
      }).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--text-dim);margin-top:2px">
      <span>t=0s</span><span>t=${data[data.length-1].time}s</span>
    </div>
  </div>`;

  // Voter status
  html += `<div style="margin-top:16px">
    <div style="font-size:10px;color:var(--text-dim);margin-bottom:6px;letter-spacing:1px">VOTER STATUS</div>
    <table class="req-table">
      <thead><tr><th>Property</th><th>Value</th><th>Status</th></tr></thead>
      <tbody>
        <tr><td>Active Channels</td><td>A, B, C (D isolated)</td><td><span class="req-warn">3 OF 4</span></td></tr>
        <tr><td>Selection Algorithm</td><td>Median of included</td><td><span class="req-pass">NOMINAL</span></td></tr>
        <tr><td>Voter Output</td><td>${median.toFixed(4)} deg</td><td><span class="req-pass">VALID</span></td></tr>
        <tr><td>Max Channel Deviation</td><td>${Math.max(...vals.map(v => Math.abs(v - median))).toFixed(4)} deg</td>
            <td><span class="${Math.max(...vals.map(v => Math.abs(v - median))) < tol ? 'req-pass' : 'req-fail'}">${Math.max(...vals.map(v => Math.abs(v - median))) < tol ? 'WITHIN TOL' : 'EXCEEDS TOL'}</span></td></tr>
      </tbody>
    </table>
  </div>`;

  return html;
}

function renderB5FDIR(sub) {
  let html = '';
  const scenario = sub.fdirScenario;

  html += `<div class="section-header">FDIR SEQUENCE — CH-${scenario.faultChannel} FAULT EVENT</div>`;

  if (state.showExplanations) {
    html += `<div class="info-box">
      <div class="info-title">FDIR STATE MACHINE</div>
      The <code>FDIRSequenceTracker</code> monitors each FCC channel independently. When a channel's output
      deviates beyond tolerance, the state machine progresses through three phases:
      <strong>DETECT</strong> (confirm fault within 3 frames),
      <strong>ISOLATE</strong> (exclude channel from voter within 50ms),
      <strong>RECOVER</strong> (stabilize on remaining channels within 100ms).
      Each phase has invariants (e.g., control authority maintained during isolation).
      Cascade policies handle overlapping faults: <code>spawn_new</code>, <code>queue</code>, or <code>reject</code>.
    </div>`;
  }

  // FDIR Timeline (Gantt-style)
  const totalSpan = scenario.phases[scenario.phases.length - 1].end - scenario.phases[0].start;
  const timelineStart = scenario.phases[0].start;

  html += `<div class="fdir-timeline">`;
  scenario.phases.forEach(phase => {
    const left = ((phase.start - timelineStart) / totalSpan) * 100;
    const width = ((phase.end - phase.start) / totalSpan) * 100;
    const phaseCls = phase.name.toLowerCase();
    const duration = ((phase.end - phase.start) * 1000).toFixed(0);
    html += `<div class="fdir-phase-row">
      <div class="fdir-phase-label" style="width:80px;font-size:10px;letter-spacing:1px;color:var(--text-dim)">${phase.name}</div>
      <div style="flex:1;position:relative;height:24px;background:var(--bg-deep);border-radius:3px;overflow:hidden">
        <div class="fdir-phase-bar ${phaseCls}"
             style="position:absolute;left:${left}%;width:${width}%;height:100%;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#000;font-weight:bold">
          ${duration}ms
        </div>
      </div>
      <div style="width:60px;text-align:right">
        <span class="${phase.status === 'pass' ? 'req-pass' : 'req-fail'}">${phase.status === 'pass' ? 'PASS' : 'FAIL'}</span>
      </div>
    </div>`;
  });
  html += `</div>`;

  // FDIR timing table
  html += `<div style="margin-top:16px">
    <table class="req-table">
      <thead><tr><th>Phase</th><th>Start</th><th>End</th><th>Duration</th><th>Limit</th><th>Status</th></tr></thead>
      <tbody>
        ${scenario.phases.map(p => {
          const dur = ((p.end - p.start) * 1000).toFixed(1);
          const limits = { DETECT: '75ms (3 frames)', ISOLATE: '50ms', RECOVER: '100ms' };
          return `<tr>
            <td style="font-weight:bold">${p.name}</td>
            <td>${p.start.toFixed(3)}s</td>
            <td>${p.end.toFixed(3)}s</td>
            <td>${dur}ms</td>
            <td>${limits[p.name]}</td>
            <td><span class="${p.status === 'pass' ? 'req-pass' : 'req-fail'}">${p.status === 'pass' ? 'PASS' : 'FAIL'}</span></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;

  // Phase invariants
  html += `<div style="margin-top:16px">
    <div style="font-size:10px;color:var(--text-dim);margin-bottom:6px;letter-spacing:1px">PHASE INVARIANTS</div>
    <table class="req-table">
      <thead><tr><th>Invariant</th><th>Phase</th><th>Status</th></tr></thead>
      <tbody>
        <tr><td>Control authority maintained</td><td>ALL</td><td><span class="req-pass">PASS</span></td></tr>
        <tr><td>Voter output continuous</td><td>ISOLATE</td><td><span class="req-pass">PASS</span></td></tr>
        <tr><td>Excluded channel not in voter</td><td>RECOVER</td><td><span class="req-pass">PASS</span></td></tr>
        <tr><td>3-channel convergence</td><td>RECOVER</td><td><span class="req-pass">PASS</span></td></tr>
      </tbody>
    </table>
  </div>`;

  // Channel health matrix
  html += `<div style="margin-top:16px">
    <div style="font-size:10px;color:var(--text-dim);margin-bottom:6px;letter-spacing:1px">CHANNEL HEALTH MATRIX — POST-FDIR</div>
    <div class="xchan-grid">
      ${['A','B','C','D'].map(ch => {
        const isFault = ch === scenario.faultChannel;
        return `<div class="chan-card ${isFault ? 'isolated' : 'healthy'}">
          <div class="chan-label">CH-${ch}</div>
          <div style="font-size:11px;margin-top:4px;color:${isFault ? 'var(--red)' : 'var(--green-mid)'}">
            ${isFault ? 'ISOLATED' : 'ACTIVE'}
          </div>
          <div style="font-size:9px;color:var(--text-dim);margin-top:4px">
            Voter: ${isFault ? 'EXCLUDED' : 'INCLUDED'}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  return html;
}

}

// ─── STAGE 5: AI/ML ───
function renderAIML() {
  const sub = SUBSYSTEMS[state.subsystem];
  const sensitivity = state.anomalySensitivity;
  let html = '';

  html += `<div class="content-title">STAGE 06: AI/ML ANOMALY DETECTION</div>`;
  html += `<div class="content-desc">
    Beyond rule-based AS3 checks, the AI/ML engine uses Isolation Forest to detect
    subtle anomalies in parameter behavior that may indicate unreported issues.
  </div>`;

  if (state.showExplanations) {
    html += `<div class="info-box">
      <div class="info-title">HOW ISOLATION FOREST WORKS</div>
      Isolation Forest detects anomalies by randomly partitioning data. Anomalous points
      require <strong>fewer splits</strong> to isolate because they differ from normal data.
      The <code>contamination</code> parameter (currently ${(sensitivity*100).toFixed(0)}%) sets
      the expected proportion of anomalies — higher values flag more points, increasing
      sensitivity but also false positives. The algorithm scores each sample from 0.0 (normal)
      to 1.0 (anomalous). Points above the threshold are flagged for engineer review.
      <br><br>
      <strong>Severity classification:</strong> Each anomaly is assigned a severity level
      (<code>LOW</code>, <code>MEDIUM</code>, <code>HIGH</code>, <code>CRITICAL</code>) based on
      Z-score magnitude and parameter criticality. The <code>AnomalyReport</code> tracks true totals
      even when capping stored details at 10,000 for memory efficiency, so the UI correctly shows
      "16,009+ anomalies" rather than a misleading exact count.
      <br><br>
      <strong>Cluster detection:</strong> A post-processing pass groups related anomalies (3+
      of the same type within 5 seconds) into clusters, helping engineers distinguish isolated
      events from systemic issues. Clusters are surfaced as callouts in the Anomalies dashboard.
      <br><br>
      <strong>ML Sensitivity Presets:</strong> Administrators can configure named sensitivity presets
      (e.g., Conservative, Standard, Aggressive) via the Admin &rarr; ML Sensitivity tab. Each preset
      defines contamination parameter bounds for the Isolation Forest. Analysts select a preset on
      the Landing page before pipeline execution &mdash; the selected preset's bounds override the
      default contamination parameter.
    </div>`;
  }

  // Re-classify based on sensitivity
  const threshold = 1.0 - sensitivity;
  const classified = sub.anomalyData.map(d => ({
    ...d,
    detected: d.value > threshold ? 'anomaly' : (d.value > threshold - 0.1 ? 'borderline' : 'normal')
  }));

  const anomalyCount = classified.filter(d => d.detected === 'anomaly').length;
  const borderlineCount = classified.filter(d => d.detected === 'borderline').length;
  const normalCount = classified.filter(d => d.detected === 'normal').length;

  html += `<div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">SAMPLES ANALYZED</div>
      <div class="stat-value">${classified.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">ANOMALIES DETECTED</div>
      <div class="stat-value fail-val">${anomalyCount}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">BORDERLINE</div>
      <div class="stat-value warn-val">${borderlineCount}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">NORMAL</div>
      <div class="stat-value">${normalCount}</div>
    </div>
  </div>`;

  // Anomaly score chart
  html += `<div class="ctrl-label" style="margin:12px 0 6px">ANOMALY SCORE TIMELINE — ${sub.short} PARAMETERS</div>`;
  html += `<div class="anomaly-chart">`;

  // Y-axis labels and bars
  const rows = 12;
  for (let row = rows; row >= 0; row--) {
    const yVal = (row / rows).toFixed(1);
    html += `<div class="chart-row">
      <span class="chart-label">${row === rows ? '1.0' : row === 0 ? '0.0' : row % 3 === 0 ? yVal : ''}</span>
      <div class="chart-bar-area">`;

    classified.forEach(d => {
      const barRow = Math.floor(d.value * rows);
      if (barRow === row) {
        html += `<div class="chart-dot ${d.detected}" title="t=${d.time}s score=${d.value.toFixed(2)}"></div>`;
      } else {
        html += `<div style="width:6px"></div>`;
      }
    });

    html += `</div></div>`;
  }

  // Threshold line indicator
  html += `<div style="margin-top:8px;font-size:10px">
    <span style="color:var(--text-dim)">── Threshold: </span>
    <span style="color:var(--amber)">${threshold.toFixed(2)}</span>
    <span style="color:var(--text-dim)"> │ </span>
    <span class="chart-dot normal" style="display:inline-block;vertical-align:middle"></span>
    <span style="color:var(--text-dim)"> Normal </span>
    <span class="chart-dot borderline" style="display:inline-block;vertical-align:middle"></span>
    <span style="color:var(--text-dim)"> Borderline </span>
    <span class="chart-dot anomaly" style="display:inline-block;vertical-align:middle"></span>
    <span style="color:var(--text-dim)"> Anomaly</span>
  </div>`;

  html += `</div>`;

  // Detected anomalies list
  if (anomalyCount > 0) {
    html += `<div class="ctrl-label" style="margin:16px 0 8px">FLAGGED ANOMALIES</div>`;
    html += `<table class="data-table"><tr>
      <th>TIME (s)</th><th>SCORE</th><th>CLASSIFICATION</th><th>RECOMMENDED ACTION</th>
    </tr>`;
    classified.filter(d => d.detected === 'anomaly').slice(0, 15).forEach(d => {
      const action = d.value > 0.9 ? 'Engineer review required' : 'Monitor — verify against AS3';
      html += `<tr>
        <td class="dim">${d.time}</td>
        <td class="fail">${d.value.toFixed(3)}</td>
        <td><span class="req-status fail">ANOMALY</span></td>
        <td class="dim">${action}</td>
      </tr>`;
    });
    html += `</table>`;
  }

  // Feature importance (simulated)
  html += `<div class="ctrl-label" style="margin:16px 0 8px">FEATURE IMPORTANCE — ISOLATION FOREST</div>`;
  const features = getFeatureImportance(state.subsystem);
  html += `<div style="background:var(--bg-surface);border:1px solid var(--border);padding:12px">`;
  features.forEach(f => {
    const barWidth = Math.round(f.importance * 100);
    html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="width:140px;font-size:10px;color:var(--text);text-align:right">${f.name}</span>
      <div style="flex:1;height:12px;background:var(--bg-deep);border:1px solid var(--border)">
        <div style="width:${barWidth}%;height:100%;background:${f.importance > 0.6 ? 'var(--green-bright)' : f.importance > 0.3 ? 'var(--green-dim)' : 'var(--text-dim)'};transition:width 0.3s"></div>
      </div>
      <span style="width:40px;font-size:10px;color:var(--green-mid);text-align:right">${(f.importance * 100).toFixed(0)}%</span>
    </div>`;
  });
  html += `</div>`;

  return html;
}

function getFeatureImportance(subsystem) {
  const features = {
    radar: [
      { name: 'Target Range', importance: 0.82 },
      { name: 'Update Rate', importance: 0.71 },
      { name: 'Mode Transitions', importance: 0.64 },
      { name: 'Bearing Δ', importance: 0.53 },
      { name: 'BIT Status', importance: 0.28 },
    ],
    ew: [

      { name: 'Response Latency', importance: 0.75 },
      { name: 'CM Inventory Δ', importance: 0.61 },
      { name: 'Signal Strength', importance: 0.44 },
      { name: 'Bearing Accuracy', importance: 0.32 },
    ],
    nav: [
      { name: 'Position Drift', importance: 0.91 },
      { name: 'FOM Changes', importance: 0.69 },
      { name: 'GPS SV Count', importance: 0.57 },
      { name: 'Heading Rate', importance: 0.41 },
      { name: 'Altitude Δ', importance: 0.22 },
    ],

    <tr>

      <td class="dim">sqrt(ground_range^2 + alt_diff^2)</td>
      <td>ground_range_nm, alt_diff_nm</td>
      <td style="color:var(--cyan)">sqrt</td>
      <td>nm</td>
    </tr>
    <tr>
      <td class="decoded">closure_rate_kts</td>
      <td class="dim">own_gs - tgt_gs * cos(aspect)</td>
      <td>own_ground_speed_kts, tgt_ground_speed_kts, aspect_angle_rad</td>
      <td style="color:var(--cyan)">subtract + multiply</td>
      <td>kts</td>
    </tr>
    <tr>
      <td class="decoded">time_to_impact_sec</td>
      <td class="dim">slant_range / closure_rate</td>
      <td>slant_range_nm, closure_rate_kts</td>
      <td style="color:var(--cyan)">divide</td>
      <td>sec</td>
    </tr>
    <tr>
      <td class="decoded">track_correlation_score</td>
      <td class="dim">abs(mids_lat - display_lat) + abs(mids_lon - display_lon)</td>
      <td>mids_track_lat_deg, display_track_lat_deg, ...</td>
      <td style="color:var(--cyan)">abs + add</td>
      <td>deg</td>
    </tr>
  </table>`;

  // Safe operators table
  html += `<div class="ctrl-label" style="margin:16px 0 8px">SAFE OPERATOR DISPATCH TABLE</div>`;
  html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">';
  ['add','subtract','multiply','divide','abs','sqrt','min','max','sin','cos','atan2'].forEach(op => {
    html += '<div style="background:var(--bg-surface);border:1px solid var(--border);padding:4px 10px;font-size:10px">'
      + '<span style="color:var(--cyan)">' + op + '</span></div>';
  });
  html += '</div>';

  // Mission config example
  html += `<div class="ctrl-label" style="margin:16px 0 8px">MISSION CONFIG CONSTANTS (NOTIONAL)</div>`;
  html += `<table class="data-table"><tr>
    <th>CONSTANT</th><th>VALUE</th><th>PURPOSE</th>
  </tr>

    <tr><td class="decoded">altitude_reference_ft</td><td>0.0</td><td>MSL baseline for alt computations</td></tr>

    <tr><td class="decoded">jassm_profile_count</td><td>4</td><td>Number of JASSM profiles for TC-04</td></tr>

  return html;
}

function renderCV() {
  let html = '';

  html += `<div class="content-title">STAGE 07: COMPUTER VISION PIPELINE</div>`;
  html += `<div class="content-desc">
    The CV pipeline analyzes extracted MFD (Multi-Function Display) video frames to verify
    that symbology matches ICD-decoded bus data. It detects track symbols, reads OCR text,
    verifies positions against expected locations from 1553 data, and classifies colors

    html += renderCVOverview();

    html += renderCVDetections();

// ─── DECODE HELPERS ───
function extractBits(word, hi, lo) {
  const mask = ((1 << (hi - lo + 1)) - 1);
  return (word >> lo) & mask;
}

function decodeField(rawWord, field) {
  const val = extractBits(rawWord, field.bitsHi, field.bitsLo);
  if (field.type === 'Enum' || field.type === 'Discrete') {
    return field.enums[val] || `UNKN(${val})`;
  }
  if (field.type === 'Signed') {
    const bits = field.bitsHi - field.bitsLo + 1;
    const signBit = 1 << (bits - 1);
    const signedVal = val >= signBit ? val - (1 << bits) : val;
    return (signedVal * (field.lsb || 1)).toFixed(3);
  }
  return (val * (field.lsb || 1)).toFixed(3);
}

function decodeFieldCustomLsb(rawWord, field, lsb) {
  const val = extractBits(rawWord, field.bitsHi, field.bitsLo);
  if (field.type === 'Enum' || field.type === 'Discrete') {
    return field.enums[val] || `UNKN(${val})`;
  }
  if (field.type === 'Signed') {
    const bits = field.bitsHi - field.bitsLo + 1;
    const signBit = 1 << (bits - 1);
    const signedVal = val >= signBit ? val - (1 << bits) : val;
    return (signedVal * (lsb || 1)).toFixed(3);
  }
  return (val * (lsb || 1)).toFixed(3);
}

function updatePrompt() {
  const sub = SUBSYSTEMS[state.subsystem];
  const msg = sub.messages[state.messageIdx] || sub.messages[0];
  const parts = [];

  parts.push(`Explain the F-16 PDA Tool's data pipeline for the ${sub.name} subsystem (RT ${sub.rt}).`);

  switch (state.stage) {
    case 'ingest':
      parts.push(`\nFocus on .C10 + PCAP ingestion: how MIL-STD-1553B bus traffic and Ethernet PCAP data are captured, demuxed by RT/SA, and normalized into a unified MessageStore.`);
      parts.push(`This subsystem uses ${sub.messages.length} message types (${sub.messages.map(m => `SA ${m.sa}: ${m.label}`).join(', ')}).`);
      parts.push(`PCAP files provide Ethernet traffic (Link 16, JASSM, TGP) mapped to virtual RT/SA via ICD virtual_rt_mapping. The pcap_time_aligned flag controls time synchronization.`);
      if (state.showDecoded) parts.push(`Show the decoded engineering-unit values alongside raw hex.`);
      break;

    case 'icd':
      parts.push(`\nFocus on ICD parsing: how raw 1553 data words are decoded using bit-field definitions.`);
      parts.push(`Current message: RT ${sub.rt}, SA ${msg.sa} (${msg.label}), ${msg.wc} words, ${msg.dir}.`);
      parts.push(`Fields: ${msg.fields.map(f => `${f.name} [${f.bitsHi}:${f.bitsLo}] ${f.type}${f.lsb ? ' LSB=' + f.lsb : ''}`).join('; ')}.`);
      if (state.lsbOverride !== null && msg.fields[0].lsb) {
        parts.push(`Note: LSB scaling for "${msg.fields[0].name}" adjusted from ${msg.fields[0].lsb} to ${state.lsbOverride.toFixed(3)} to show sensitivity.`);
      }
      break;

    case 'derived':
      parts.push(`\nFocus on the Derived Field Computation layer (Stage 03).`);
      parts.push(`The DerivedFieldEngine creates virtual parameters by combining decoded ICD fields before AS3 evaluation.`);
      parts.push(`Definitions in data/derived_fields/demo_derived.json specify field_name, inputs, operator, and optional guard conditions.`);
      parts.push(`Uses a safe operator dispatch table (add, subtract, multiply, divide, abs, sqrt, min, max, sin, cos, atan2) with no dynamic code.`);
      parts.push(`Mission config (data/mission_config/demo_mission.json) provides sortie-specific constants injected into the evaluator.`);
      break;

    case 'as3': {
      const p = sub.requirements.filter(r => r.status === 'pass').length;
      const f = sub.requirements.filter(r => r.status === 'fail').length;
      const w = sub.requirements.filter(r => r.status === 'warn').length;
      parts.push(`\nFocus on AS3 requirement evaluation: ${sub.requirements.length} requirements checked.`);
      parts.push(`Results: ${p} PASS, ${f} FAIL, ${w} WARNING.`);
      if (sub.isTC) {
        parts.push(`This is TC demo sortie ${sub.sortie}. Initial state: ${sub.initialState}`);
        const ruleTypes = [...new Set(sub.requirements.map(r => r.ruleType).filter(Boolean))];
        if (ruleTypes.length) parts.push(`Rule types exercised: ${ruleTypes.join(', ')}.`);
      }
      if (f > 0) {
        const failures = sub.requirements.filter(r => r.status === 'fail');
        parts.push(`Failed requirements: ${failures.map(r => `${r.id} (${r.text} — actual: ${r.actual}, threshold: ${r.threshold})`).join('; ')}.`);
      }
      break;
    }

    case 'b5': {
      const b5sub = SUBSYSTEMS.flcs;
      const bp = b5sub.requirements.filter(r => r.status === 'pass').length;
      const bf = b5sub.requirements.filter(r => r.status === 'fail').length;
      parts.push(`\nFocus on B5 sub-system requirement evaluation for the Flight Control Computer (FCC).`);
      parts.push(`The FLCS uses quad-redundant channels (A, B, C, D) on a dedicated FLCS bus (bus_name='FLCS_BUS').`);
      if (state.b5View === 'xchan') {
        parts.push(`Current view: Cross-channel correlation. Agreement tolerance: ${state.xchanTolerance} deg.`);
        parts.push(`The ChannelFrameBuffer time-aligns data from 4 channels within 2ms, then compares per-field values.`);
        if (state.b5Channel) {
          parts.push(`Focused on Channel ${state.b5Channel}.`);
        }
      } else if (state.b5View === 'fdir') {
        const sc = b5sub.fdirScenario;
        parts.push(`Current view: FDIR timeline for Ch-${sc.faultChannel} fault at t=${sc.triggerTime}s.`);
        parts.push(`Phases: ${sc.phases.map(p => `${p.name} (${((p.end-p.start)*1000).toFixed(0)}ms, ${p.status})`).join(' → ')}.`);
        parts.push(`The FDIRSequenceTracker state machine verifies detect/isolate/recover timing and phase invariants.`);
      } else {
        parts.push(`B5 requirement results: ${bp} PASS, ${bf} FAIL out of ${b5sub.requirements.length} total.`);
        if (bf > 0) {
          const fails = b5sub.requirements.filter(r => r.status === 'fail');
          parts.push(`Failed: ${fails.map(r => `${r.id} (${r.text} — actual: ${r.actual})`).join('; ')}.`);
        }
      }
      break;
    }

    case 'aiml': {
      const threshold = 1.0 - state.anomalySensitivity;
      const classified = sub.anomalyData.map(d => ({ ...d, detected: d.value > threshold ? 'anomaly' : 'normal' }));
      const anomalyCount = classified.filter(d => d.detected === 'anomaly').length;
      parts.push(`\nFocus on AI/ML anomaly detection using Isolation Forest.`);
      parts.push(`Contamination parameter: ${(state.anomalySensitivity * 100).toFixed(0)}% (threshold: ${threshold.toFixed(2)}).`);
      parts.push(`Results: ${anomalyCount} anomalies detected out of ${classified.length} samples.`);
      parts.push(`Anomalies are classified by severity (LOW, MEDIUM, HIGH, CRITICAL) with cluster detection grouping related events.`);
      parts.push(`The AnomalyReport caps stored details at 10,000 while tracking the true total count.`);
      if (state.anomalySensitivity !== DEFAULTS.anomalySensitivity) {
        parts.push(`Sensitivity adjusted from default ${(DEFAULTS.anomalySensitivity*100)}% to ${(state.anomalySensitivity*100).toFixed(0)}%.`);
      }
      break;
    }

    case 'cv': {
      parts.push(`\nFocus on the Computer Vision (CV) pipeline for MFD video analysis (Stage 07).`);
      parts.push(`The CV pipeline analyzes extracted MFD video frames: frame extraction, preprocessing, symbol detection, OCR, position verification, and color classification.`);
      parts.push(`Detection backend: ${state.cvBackend} (confidence threshold: ${(state.cvConfidence * 100).toFixed(0)}%).`);
      if (state.cvBackend === 'yolo') {
        parts.push(`YOLOv8-nano ONNX model — CPU-only inference via onnxruntime, air-gapped safe, optional SHA-256 model hash verification.`);
      } else {
        parts.push(`Template-based NCC matching — lightweight, no model files, multi-scale correlation with NMS.`);
      }
      if (state.cvView === 'trackbridge') {
        parts.push(`Track Bridge: converts ICD-decoded 1553 radar tracks to ExpectedTrack objects for cross-domain verification against CV detections.`);
      }
      parts.push(`Symbol classes: hostile_track, friendly_track, unknown_track, neutral_track. Output stored as cv_eval_report in PipelineResult.`);
      break;
    }

    case 'viz': {
      parts.push(`\nFocus on the visualization and video playback layer.`);
      if (state.vizView === 'video') {
        parts.push(`Video pipeline: Chapter 10 Type 0xF0 packets are extracted per channel, re-encoded from MPEG-2 to H.264 for browser playback.`);
        parts.push(`HUD overlay renders altitude, airspeed, heading, Mach, G-loading, and AOA using zero-order-hold from nearest 1553 sample.`);
        parts.push(`Frame-step controls (comma/period keys), playback speed selection, and M-key quick-mark annotation.`);
      } else if (state.vizView === 'replay') {
        parts.push(`Flight Replay mode provides synchronized video + bus-data playback with a unified transport bar.`);
        parts.push(`Uses a two-tier update architecture: 60fps rAF loop for transport bar and chart playhead (direct DOM), deferred React state for chart data (on pause/seek).`);
        parts.push(`Pre-video timer fallback handles bus data starting before video recording. Auto-pause fires at violations/anomalies.`);
        parts.push(`Loop regions, variable speed (0.1x–8x), and keyboard shortcuts for efficient review.`);
      } else if (state.vizView === 'timeline') {
        parts.push(`Timeline page features: parameter sidebar with sparkline previews, synchronized brush/zoom across all charts and video.`);
        parts.push(`FTE presets provide curated parameter groupings. Cross-page navigation jumps from Requirements/Anomalies with context.`);
        parts.push(`Up to 8 parameters displayed with distinct dash patterns. Data cursor provides hover readout at any timestamp.`);
      } else {
        parts.push(`Annotation system: timestamped markers with categories (general, requirement, anomaly, safety, discrepancy).`);
        parts.push(`CRUD API at /api/annotations with audit trails. M-key quick-mark with inline label editing.`);
        parts.push(`Annotations appear on Timeline charts, video scrub bar, and cross-reference AS3/B5 requirements.`);
      }
      break;
    }
  }

  document.getElementById('prompt-text').textContent = parts.join('\n');
}

// ─── STATE MANAGEMENT ───
function setState(key, value) {
  state[key] = value;
  if (key === 'subsystem') {
    state.messageIdx = 0;
    state.lsbOverride = null;
  }
  if (key === 'stage') {
    state.lsbOverride = null;
    if (value === 'b5') {
      state.subsystem = 'flcs';
      state.messageIdx = 0;
    }
  }
  updateAll();
}

function updateAll() {
  renderPipeline();
  renderSidebar();
  renderContent();
  updatePrompt();
}

function copyPrompt() {
  const text = document.getElementById('prompt-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'COPIED';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'COPY BRIEFING';
      btn.classList.remove('copied');
    }, 1500);
  });
}

// ─── THEME TOGGLE ───
function toggleTheme() {
  document.body.classList.toggle('light-mode');
  const btn = document.getElementById('theme-toggle');
  btn.textContent = document.body.classList.contains('light-mode') ? 'DARK MODE' : 'LIGHT MODE';
}

// ─── INIT ───
updateAll();
</script>
</body>
